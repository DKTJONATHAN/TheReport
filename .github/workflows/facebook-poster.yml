name: Social Blast (With Hashtags)

on:
  push:
    paths:
      - 'src/content/posts/**.md'
      - 'src/content/posts/**.mdx'
    branches:
      - main
  workflow_dispatch:
    inputs:
      specific_slug:
        description: 'Slug of the post (e.g., "my-new-article")'
        required: false
        type: string

jobs:
  publish-to-facebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Wait for Deployment (Auto-Push Only)
        if: github.event_name == 'push'
        run: |
          echo "Waiting 30 seconds for site to build..."
          sleep 30

      - name: Detect and Post Article
        env:
          FB_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          SITE_URL: "https://jonathanmwaniki.co.ke"
          INPUT_SLUG: ${{ inputs.specific_slug }}
        run: |
          # 1. Determine which file/slug to process
          if [ -n "$INPUT_SLUG" ]; then
            SLUG="$INPUT_SLUG"
            FILE=$(find src/content/posts -name "${SLUG}.md*" | head -n 1)
          else
            # Find the most recently changed file in content/posts
            FILE=$(git diff --name-only HEAD~1 HEAD | grep 'src/content/posts/' | head -n 1)
            
            if [ -z "$FILE" ]; then
              echo "No post file detected. Exiting."
              exit 0
            fi
            
            FILENAME=$(basename "$FILE")
            SLUG="${FILENAME%.*}"
          fi

          echo "Processing File: $FILE"

          # 2. Extract Description, Image, & Link
          if [ -f "$FILE" ]; then
            # Extract description and remove quotes
            DESCRIPTION=$(grep -m 1 "^description:" "$FILE" | cut -d: -f2- | tr -d '"' | tr -d "'" | sed 's/^ *//')
            
            # Extract image URL and remove quotes
            IMAGE_URL=$(grep -m 1 "^image:" "$FILE" | cut -d: -f2- | tr -d '"' | tr -d "'" | sed 's/^ *//')
            
            # 3. Extract Tags and Convert to Hashtags
            RAW_TAGS=$(grep -m 1 "^tags:" "$FILE" | sed -e 's/tags://' -e 's/\[//' -e 's/\]//' -e 's/"//g' -e "s/'//g")
            
            HASHTAGS=""
            if [ -n "$RAW_TAGS" ]; then
              HASHTAGS=$(echo "$RAW_TAGS" | awk -F, '{for(i=1;i<=NF;i++) {gsub(/^ +| +$/,"",$i); if($i!="") printf "#%s ", $i}}')
            fi
            
          else
            DESCRIPTION="Read the latest updates on our website."
            IMAGE_URL=""
            HASHTAGS="#News"
          fi

          LINK="$SITE_URL/posts/$SLUG/"
          
          # Combine Description, Hashtags, and Link for the caption
          FINAL_MESSAGE="$DESCRIPTION

          $HASHTAGS

          Read the full story here: $LINK"

          echo "Posting: $FINAL_MESSAGE"

          # 4. Download and Send to Facebook
          if [ -n "$IMAGE_URL" ]; then
            echo "Image found. Disguising as a web browser to download the image locally..."
            
            # Download the image using a fake Chrome User-Agent so the news site allows the download
            curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -o fb_preview_image.jpg "$IMAGE_URL"
            
            # Check if the file exists and is not empty
            if [ -s "fb_preview_image.jpg" ]; then
              echo "Image downloaded successfully. Uploading direct file to Facebook photos endpoint..."
              curl -s -X POST "https://graph.facebook.com/v24.0/me/photos" \
                -F "message=$FINAL_MESSAGE" \
                -F "source=@fb_preview_image.jpg" \
                -F "access_token=$FB_TOKEN"
            else
              echo "Download failed (site might have extreme bot protection). Falling back to link scraping..."
              curl -s -X POST "https://graph.facebook.com/v24.0/me/feed" \
                -d "message=$FINAL_MESSAGE" \
                -d "link=$LINK" \
                -d "access_token=$FB_TOKEN"
            fi
          else
            echo "No image found in markdown. Falling back to feed endpoint..."
            curl -s -X POST "https://graph.facebook.com/v24.0/me/feed" \
              -d "message=$FINAL_MESSAGE" \
              -d "link=$LINK" \
              -d "access_token=$FB_TOKEN"
          fi