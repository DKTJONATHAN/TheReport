name: Social Blast (With Hashtags)

on:
  push:
    paths:
      - 'src/content/posts/**.md'
      - 'src/content/posts/**.mdx'
    branches:
      - main
  workflow_dispatch:
    inputs:
      specific_slug:
        description: 'Slug of the post (e.g., "my-new-article")'
        required: false
        type: string

jobs:
  publish-to-facebook:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y jq curl python3 file

      - name: Wait for Deployment (Auto-Push Only)
        if: github.event_name == 'push'
        run: |
          echo "Waiting 30 seconds for site to build..."
          sleep 30

      - name: Detect and Post Article
        env:
          FB_TOKEN: ${{ secrets.FACEBOOK_PAGE_TOKEN }}
          SITE_URL: "https://jonathanmwaniki.co.ke"
          INPUT_SLUG: ${{ inputs.specific_slug }}
        run: |
          # 1. Determine which file/slug to process
          if [ -n "$INPUT_SLUG" ]; then
            SLUG="$INPUT_SLUG"
            FILE=$(find src/content/posts -name "${SLUG}.md*" | head -n 1)
          else
            # Find the most recently changed file in content/posts
            FILE=$(git diff --name-only HEAD~1 HEAD | grep 'src/content/posts/' | head -n 1)
            
            if [ -z "$FILE" ]; then
              echo "No post file detected. Exiting."
              exit 0
            fi
            
            FILENAME=$(basename "$FILE")
            SLUG="${FILENAME%.*}"
          fi

          echo "Processing File: $FILE"

          # 2. Extract Title, Paragraphs, Image, & Tags
          if [ -f "$FILE" ]; then
            # Extract title and remove quotes
            TITLE=$(grep -m 1 "^title:" "$FILE" | cut -d: -f2- | tr -d '"' | tr -d "'" | sed 's/^ *//')
            
            # Robustly extract the image URL, removing quotes and spaces
            IMAGE_URL=$(grep -m 1 "^image:" "$FILE" | sed -E "s/^image: *['\"]?([^'\"]+)['\"]?/\1/")
            
            # Extract the first two paragraphs (Skipping the YAML frontmatter)
            PARAGRAPHS=$(awk 'BEGIN {count=0; body=0} /^---$/ {count++; if(count==2){body=1; next}} body==1 {print}' "$FILE" | awk -v RS='' -v ORS='\n\n' 'NR<=2')
            
            # Extract Tags and Convert to Hashtags
            RAW_TAGS=$(grep -m 1 "^tags:" "$FILE" | sed -e 's/tags://' -e 's/\[//' -e 's/\]//' -e 's/"//g' -e "s/'//g")
            
            HASHTAGS=""
            if [ -n "$RAW_TAGS" ]; then
              HASHTAGS=$(echo "$RAW_TAGS" | awk -F, '{for(i=1;i<=NF;i++) {gsub(/^ +| +$/,"",$i); if($i!="") printf "#%s ", $i}}')
            fi
            
          else
            TITLE="New Update"
            PARAGRAPHS="Check out our latest post."
            IMAGE_URL=""
            HASHTAGS="#News"
          fi

          if [ -z "$TITLE" ]; then TITLE="New Update"; fi

          # Convert Title to Unicode Bold for Facebook
          BOLD_TITLE=$(python3 -c "import sys; print(''.join(chr(ord(c)+120211) if 'A'<=c<='Z' else chr(ord(c)+120205) if 'a'<=c<='z' else chr(ord(c)+120764) if '0'<=c<='9' else c for c in sys.argv[1]))" "$TITLE")
          
          # Scrub all HTML, convert entities, and remove Markdown syntax from paragraphs
          CLEAN_PARAGRAPHS=$(python3 -c "import sys, html, re; text = html.unescape(sys.argv[1]); text = re.sub(r'<[^>]*>', '', text); text = re.sub(r'\[([^]]+)\]\([^)]+\)', r'\1', text); print(re.sub(r'[*_\`#]', '', text).strip())" "$PARAGRAPHS")

          LINK="$SITE_URL/posts/$SLUG/"
          
          # Safely construct the multiline message without breaking YAML formatting
          if [ -n "$HASHTAGS" ]; then
            FINAL_MESSAGE=$(printf "%s\n\n%s\n\n%s" "$BOLD_TITLE" "$CLEAN_PARAGRAPHS" "$HASHTAGS")
          else
            FINAL_MESSAGE=$(printf "%s\n\n%s" "$BOLD_TITLE" "$CLEAN_PARAGRAPHS")
          fi

          echo "Posting Main Content: $FINAL_MESSAGE"

          # 3. Download and Send Main Post to Facebook
          if [ -n "$IMAGE_URL" ] && [ "$IMAGE_URL" != "image:" ]; then
            echo "Image found. Disguising as a web browser to download..."
            curl -s -L -A "Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36" -o fb_preview_image.jpg "$IMAGE_URL"
            
            # Check the actual MIME type of the downloaded file
            MIME_TYPE=$(file --mime-type -b fb_preview_image.jpg 2>/dev/null || echo "unknown")
            echo "Downloaded file type detected as: $MIME_TYPE"
            
            if [ -s "fb_preview_image.jpg" ] && [[ "$MIME_TYPE" == image/* ]]; then
              echo "Valid image confirmed. Uploading direct file to Facebook photos endpoint..."
              FB_RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v24.0/me/photos" \
                -F "message=$FINAL_MESSAGE" \
                -F "source=@fb_preview_image.jpg" \
                -F "access_token=$FB_TOKEN")
            else
              echo "Download returned an invalid file (likely an HTML block page). Falling back to text-only post..."
              FB_RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v24.0/me/feed" \
                -d "message=$FINAL_MESSAGE" \
                -d "access_token=$FB_TOKEN")
            fi
          else
            echo "No image found. Falling back to feed endpoint (text only)..."
            FB_RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v24.0/me/feed" \
              -d "message=$FINAL_MESSAGE" \
              -d "access_token=$FB_TOKEN")
          fi

          echo "Facebook API Response: $FB_RESPONSE"

          # 4. Extract Post ID and Add Comment with Link
          # The photos endpoint returns 'post_id', the feed endpoint returns 'id'
          POST_ID=$(echo "$FB_RESPONSE" | jq -r '.post_id // .id')

          if [ "$POST_ID" != "null" ] && [ -n "$POST_ID" ]; then
            echo "Main post successful. Waiting 10 seconds for Facebook servers to sync..."
            sleep 10
            
            echo "Adding link to the comment section..."
            COMMENT_RESPONSE=$(curl -s -X POST "https://graph.facebook.com/v24.0/$POST_ID/comments" \
              -d "message=Read the full story here: $LINK" \
              -d "access_token=$FB_TOKEN")
            
            echo "Comment API Response: $COMMENT_RESPONSE"
            echo "✅ Successfully published post and link comment!"
          else
            echo "❌ Failed to retrieve Post ID. Could not add comment."
            exit 1
          fi