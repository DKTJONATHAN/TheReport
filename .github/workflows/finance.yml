name: Global News Cycle (US, UK, CA Focus)

on:
  schedule:
    # 6 Alternate Intervals for Tech and Finance
    - cron: '0 2 * * *'   # Finance
    - cron: '0 6 * * *'   # Tech
    - cron: '0 10 * * *'  # Finance
    - cron: '0 14 * * *'  # Tech
    - cron: '0 18 * * *'  # Finance
    - cron: '0 22 * * *'  # Tech
  workflow_dispatch:
    inputs:
      manual_topic:
        description: 'Force a topic (finance or tech)'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: src/content/posts
  MEMORY_FILE: .github/scrape_memory.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright
          playwright install chromium

      - name: Generate Content
        env:
          GEMINI_POOL: "${{ secrets.GEMINI_API_KEY }},${{ secrets.GEMINI_API_KEY1 }},${{ secrets.GEMINI_API_KEY2 }},${{ secrets.GEMINI_WRITE_KEY }}"
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          MANUAL_TOPIC: ${{ github.event.inputs.manual_topic }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
          CRON_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python << 'EOF'
          import os, json, requests, re, random, hashlib, time
          from datetime import datetime, timedelta, timezone
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright
          from email.utils import parsedate_to_datetime
          import textwrap

          # --- 1. CONFIGURATION ---
          def get_clean_pool(v): return [k.strip() for k in v.split(",") if k.strip()]
          gem_pool = get_clean_pool(os.environ.get("GEMINI_POOL", ""))

          def clean_text_formatting(text):
              if not text: return ""
              text = text.replace('\u2014', '-').replace('\u2013', '-')
              text = text.replace('—', '-').replace('–', '-')
              text = re.sub(r'[ \t]+', ' ', text)
              text = re.sub(r'\n{3,}', '\n\n', text)
              return text.strip()

          def get_internal_context():
              posts_dir = os.environ.get("POSTS_DIR")
              if not os.path.exists(posts_dir): return ""
              files = [f for f in os.listdir(posts_dir) if f.endswith('.md')]
              if not files: return ""
              sample = random.sample(files, min(len(files), 4))
              context = "PAST STORIES (For internal linking):\n"
              for f in sample:
                  try:
                      with open(os.path.join(posts_dir, f), 'r') as c:
                          txt = c.read()
                          t_match = re.search(r'title:\s*"(.*?)"', txt)
                          t = t_match.group(1) if t_match else f
                          context += f"- Title: {t} | URL: /posts/{f.replace('.md', '')}\n"
                  except: continue
              return context

          def run_gemini(p):
              random.shuffle(gem_pool)
              models_to_try = ["gemini-2.0-flash", "gemini-2.5-flash"]
              for model_name in models_to_try:
                  for k in gem_pool:
                      try:
                          client = genai.Client(api_key=k)
                          return client.models.generate_content(
                              model=model_name, 
                              contents=p,
                              config=types.GenerateContentConfig(temperature=0.7, max_output_tokens=8192)
                          ).text.strip()
                      except Exception as e:
                          time.sleep(1)
                          continue
              return None

          # --- 2. TOPIC ROTATION ---
          cron_map = {
              '0 2 * * *': 'finance',
              '0 6 * * *': 'tech',
              '0 10 * * *': 'finance',
              '0 14 * * *': 'tech',
              '0 18 * * *': 'finance',
              '0 22 * * *': 'tech'
          }
          topic = os.environ.get('MANUAL_TOPIC', '').lower() or cron_map.get(os.environ.get('CRON_SCHEDULE', ''), 'finance')
          
          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []

          # --- 3. GOOGLE NEWS RSS DIRECT ---
          rss_topic_map = {'finance': 'BUSINESS', 'tech': 'TECHNOLOGY'}
          rss_category = rss_topic_map.get(topic, 'BUSINESS')
          rss_url = f"https://news.google.com/rss/headlines/section/topic/{rss_category}?hl=en-US&gl=US&ceid=US:en"

          try:
              resp = requests.get(rss_url, timeout=10)
              soup = BeautifulSoup(resp.content, "xml")
              items = soup.find_all("item")
          except Exception as e:
              exit(0)

          all_items = []
          for item in items:
              link = item.link.text.strip()
              pub_str = item.pubDate.text.strip()
              title = re.sub(r'\s+-\s+[^-]+$', '', item.title.text).strip()
              try:
                  pdate = parsedate_to_datetime(pub_str)
                  all_items.append({"url": link, "title": title, "pdate": pdate})
              except: continue

          now_utc = datetime.now(timezone.utc)
          valid_candidates = [a for a in all_items if now_utc - a['pdate'] <= timedelta(hours=24)]

          if not valid_candidates:
              exit(0)

          def resolve_google_news_url(url):
              try:
                  headers = {"User-Agent": "Mozilla/5.0 (Windows NT 10.0; Win64; x64) Chrome/124.0.0.0"}
                  res = requests.get(url, headers=headers, timeout=10)
                  match = re.search(r'data-n-v="(https?://[^"]+)"', res.text)
                  if match: return match.group(1)
                  return res.url
              except: return url

          def scrape_article_free(url):
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True)
                  context = browser.new_context(user_agent="Mozilla/5.0")
                  page = context.new_page()
                  try:
                      page.goto(url, timeout=30000, wait_until="domcontentloaded")
                      content = page.content()
                      soup = BeautifulSoup(content, "html.parser")
                      img_url = ""
                      og_image = soup.find("meta", property="og:image")
                      if og_image: img_url = og_image.get("content", "")
                      all_paras = soup.find_all("p")
                      article_text = "\n\n".join([p.text.strip() for p in all_paras if len(p.text.strip()) > 60])
                      return article_text, img_url
                  except: return None, None
                  finally: browser.close()

          full_raw_text, final_hash, target_title, target_image = None, None, None, None
          for a in valid_candidates:
              target_title = a['title']
              t_hash = hashlib.md5(target_title.encode()).hexdigest()
              if t_hash in memory: continue
              resolved_url = resolve_google_news_url(a['url'])
              text, img = scrape_article_free(resolved_url)
              if text and len(text) > 600:
                  full_raw_text = text
                  final_hash = t_hash
                  target_image = img
                  break 

          if not full_raw_text: exit(0)

          # --- UPDATED PROMPT FOR OPENING PARAGRAPHS ---
          internal_linking = get_internal_context()
          finance_instruction = ""
          if topic == 'finance':
              finance_instruction = "- FINANCE: Analyze the practical impact on everyday consumers using a creative subheading at the end."

          prompt = f"""OPERATE AS A SENIOR JOURNALIST. 
          SOURCE MATERIAL: {full_raw_text[:10000]}
          {internal_linking}

          MANDATE:
          - ARTICLE STRUCTURE: You MUST start with a strong "Lead" paragraph (2-3 sentences) that summarizes the most important news immediately.
          - Never start with a subheading or dive straight into details. Start with prose.
          - Tone: Objective, analytical, and professional.
          {finance_instruction}
          
          *** INTERNAL LINKING ***
          - Seamlessly weave one link from 'PAST STORIES' into the middle of a paragraph: [Anchor Text](/posts/slug)

          *** FORMATTING ***
          - Start the BODY section with a high-impact opening paragraph.
          - Use ## Subheadings only AFTER the first two paragraphs.
          - No em-dashes or en-dashes. Use standard hyphens.

          OUTPUT FORMAT:
          TITLE: [Headline]
          DESCRIPTION: [Summary]
          IMAGE_CAPTION: [Caption]
          CATEGORY: [{topic.title()}]
          TAGS: [3 tags]
          IMAGE_KEYWORD: [2-3 word phrase]
          BODY:
          [Lead Paragraph summarizing the event]

          [Second Paragraph providing context]

          ## [First Subheading]
          [Rest of article]"""

          output = run_gemini(prompt)
          if not output: exit(1)

          def extract(key, text):
              m = re.search(rf"^{key}:\s*(.*)", text, re.M | re.I)
              return m.group(1).strip() if m else None

          parsed = {
              "TITLE": extract("TITLE", output) or target_title,
              "DESC": extract("DESCRIPTION", output) or "Breaking news update.",
              "CAPTION": extract("IMAGE_CAPTION", output) or "News report.",
              "IMG": extract("IMAGE_KEYWORD", output) or f"{topic} concept",
              "BODY": output.split("BODY:")[-1].strip()
          }

          for k in parsed:
              parsed[k] = clean_text_formatting(parsed[k])

          # Save and Finalize (Logic remains same for your repo structure)
          date_now = datetime.now(timezone.utc).strftime('%Y-%m-%d')
          slug = re.sub(r'[^a-z0-9-]', '-', parsed["TITLE"].lower()).strip('-')
          
          filename = f"{os.environ.get('POSTS_DIR')}/{date_now}-{slug}.md"
          with open(filename, 'w') as f:
              f.write(f"---\ntitle: \"{parsed['TITLE']}\"\ndescription: \"{parsed['DESC']}\"\ndate: {date_now}\nimage: \"{target_image or ''}\"\ncategory: \"{topic.title()}\"\n---\n\n{parsed['BODY']}")

          memory.append(final_hash)
          with open(memory_path, 'w') as f: json.dump(memory[-100:], f)
          EOF