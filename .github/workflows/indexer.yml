name: Post-Deploy Indexer & Cache Purge

on:
  push:
    branches:
      - main

jobs:
  index:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Wait for Cloudflare build to finish
        run: sleep 540

      - name: Run Indexer
        env:
          INDEXJUMP_TOKEN: ${{ secrets.INDEXJUMP_TOKEN }}
          CLOUDFLARE_ZONE_ID: ${{ secrets.CLOUDFLARE_ZONE_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: node scripts/index-posts.js