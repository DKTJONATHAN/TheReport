name: Auto Newser (Mercy Wambui - The Gossip)

on:
  schedule:
    # Runs at minute 25 of every hour from 6 AM to 10 PM EAT
    - cron: '25 3-19 * * *'
  workflow_dispatch:
    inputs:
      manual_topic:
        description: 'Force topic'
        required: false
        default: ''

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

permissions:
  contents: write

env:
  DEFAULT_BRANCH: main
  POSTS_DIR: src/content/posts
  MEMORY_FILE: .github/scrape_memory_mercy.json

jobs:
  generate-and-publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0 
          ref: ${{ env.DEFAULT_BRANCH }}
          token: ${{ secrets.PERSONAL_GITHUB_TOKEN || secrets.GITHUB_TOKEN }}
          persist-credentials: true

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install requests google-genai beautifulsoup4 lxml playwright
          playwright install chromium

      - name: Run Mercy Engine
        env:
          GEMINI_POOL: "${{ secrets.GEMINI_API_KEY }},${{ secrets.GEMINI_API_KEY1 }},${{ secrets.GEMINI_API_KEY2 }},${{ secrets.GEMINI_WRITE_KEY }}"
          UNSPLASH_ACCESS_KEY: ${{ secrets.UNSPLASH_ACCESS_KEY }}
          MANUAL_TOPIC: ${{ inputs.manual_topic }}
          MEMORY_FILE: ${{ env.MEMORY_FILE }}
          CRON_SCHEDULE: ${{ github.event.schedule }}
        run: |
          python << 'EOF'
          import os, json, datetime, requests, re, random, time, hashlib, textwrap
          from google import genai
          from google.genai import types
          from bs4 import BeautifulSoup
          from playwright.sync_api import sync_playwright

          # --- 1. CONFIGURATION ---
          def get_clean_pool(v): return [k.strip() for k in v.split(",") if k.strip()]
          gem_pool = get_clean_pool(os.environ.get("GEMINI_POOL", ""))

          def clean_dashes(text):
              if not text: return ""
              # Replace specific dashes using unicode to avoid syntax linting issues
              text = text.replace('\u2014', '-').replace('\u2013', '-')
              # Only collapse multiple spaces, NOT multiple newlines
              text = re.sub(r'[ \t]+', ' ', text)
              return text.strip()

          def get_internal_context():
              posts_dir = os.environ.get("POSTS_DIR")
              if not os.path.exists(posts_dir): return ""
              files = [f for f in os.listdir(posts_dir) if f.endswith('.md')]
              if not files: return ""
              sample = random.sample(files, min(len(files), 4))
              context = "PAST STORIES (For internal linking):\n"
              for f in sample:
                  try:
                      with open(os.path.join(posts_dir, f), 'r', encoding='utf-8') as c:
                          txt = c.read()
                          t_match = re.search(r'title:\s*"(.*?)"', txt)
                          t = t_match.group(1) if t_match else f
                          context += f"- Title: {t} | URL: /posts/{f.replace('.md', '')}\n"
                  except: continue
              return context

          def run_gemini(p):
              random.shuffle(gem_pool)
              models_to_try = ["gemini-3-flash-preview", "gemini-2.0-flash", "gemini-1.5-flash"]
              for model_name in models_to_try:
                  for k in gem_pool:
                      try:
                          client = genai.Client(api_key=k)
                          return client.models.generate_content(
                              model=model_name, 
                              contents=p,
                              config=types.GenerateContentConfig(temperature=0.9, max_output_tokens=8192)
                          ).text.strip()
                      except Exception as e:
                          time.sleep(1)
                          continue
              return None

          # --- 2. TOPIC & DISCOVERY ---
          hour = (datetime.datetime.utcnow().hour + 3) % 24  # Convert to EAT
          topics_pool = ['kenya_gossip', 'east_africa', 'africa_music', 'world_entertainment', 'kenya_gossip', 'social_media']
          auto_topic = topics_pool[hour % len(topics_pool)]
          used_topic = os.environ.get('MANUAL_TOPIC', '').lower() or auto_topic

          query_map = {
              'kenya_gossip': '"Kenya" (celebrity OR gossip OR scandal OR "social media" OR influencer)',
              'east_africa': '("Uganda" OR "Tanzania") (celebrity OR gossip OR "diamond platnumz" OR scandal OR zari)',
              'africa_music': '("Afrobeats" OR "Amapiano" OR "Naija" OR "South Africa") (music OR drama OR celebrity OR scandal)',
              'world_entertainment': '(Hollywood OR "pop culture" OR "music industry" OR celebrity) (scandal OR gossip OR drama)',
              'social_media': '(TikTok OR Instagram OR viral) (drama OR exposed OR backlash)'
          }
          query = query_map.get(used_topic, 'Kenya celebrity gossip')
          rss_url = f"https://news.google.com/rss/search?q={query}+when:12h&hl=en-KE&gl=KE&ceid=KE:en"

          memory_path = os.environ.get('MEMORY_FILE')
          memory = json.load(open(memory_path)) if os.path.exists(memory_path) else []

          print(f"🔍 Topic: {used_topic.replace('_', ' ').upper()}")
          
          try:
              res = requests.get(rss_url, timeout=15)
              soup = BeautifulSoup(res.content, "xml")
              items = soup.find_all("item")
          except: items = []

          # --- 3. FREE SCRAPER ---
          def scrape_article_free(url):
              print(f"🕷️ Stealth-Loading: {url}")
              with sync_playwright() as p:
                  browser = p.chromium.launch(headless=True, args=["--disable-blink-features=AutomationControlled", "--no-sandbox"])
                  context = browser.new_context(user_agent="Mozilla/5.0 (Windows NT 10.0; Win64; x64) AppleWebKit/537.36 (KHTML, like Gecko) Chrome/120.0.0.0 Safari/537.36")
                  page = context.new_page()
                  page.add_init_script("Object.defineProperty(navigator, 'webdriver', {get: () => undefined})")

                  try:
                      page.goto(url, timeout=60000)
                      try: page.wait_for_load_state("networkidle", timeout=10000)
                      except: pass
                      
                      content = page.content()
                      soup = BeautifulSoup(content, "html.parser")
                      
                      # EXTRACT IMAGE VIA META TAGS
                      img_url = ""
                      og_image = soup.find("meta", property="og:image")
                      if og_image and og_image.get("content"):
                          img_url = og_image["content"]
                      
                      if not img_url:
                          twitter_image = soup.find("meta", attrs={"name": "twitter:image"})
                          if twitter_image and twitter_image.get("content"):
                              img_url = twitter_image["content"]

                      article_text = ""
                      containers = soup.find_all(['article', 'main', 'div'], class_=re.compile(r'(body|content|entry|post|story)'))
                      for c in containers:
                          paras = c.find_all("p")
                          chunk = "\n\n".join([p.text.strip() for p in paras if len(p.text) > 50])
                          if len(chunk) > 500:
                              article_text = chunk
                              break
                      if not article_text:
                          all_paras = soup.find_all("p")
                          article_text = "\n\n".join([p.text.strip() for p in all_paras if len(p.text.strip()) > 60])
                      return article_text, img_url
                  except: return None, None
                  finally: browser.close()

          # --- 4. FIND & SCRAPE ---
          full_raw_text, final_hash, target_image = None, None, None
          for item in items:
              url = item.link.text
              u_hash = hashlib.md5(url.encode()).hexdigest()
              if u_hash in memory: continue
              
              result = scrape_article_free(url)
              if not result: continue
              text, img = result

              if text and len(text) > 600:
                  full_raw_text = text
                  final_hash = u_hash
                  target_image = img
                  break
          
          if not full_raw_text: print("❌ No new content."); exit(0)

          # --- 5. THE PROMPT (Mercy Wambui Persona) ---
          internal_linking = get_internal_context()
          prompt = f"""OPERATE AS 'MERCY WAMBUI', A CYNICAL ENTERTAINMENT GOSSIPER AND POP CULTURE CRITIC.
          SOURCE MATERIAL: {full_raw_text[:12000]}
          
          {internal_linking}
          
          MANDATE: 
          - Focus on celebrity gossip, music industry drama, and social media buzz.
          - Tone: Cynical, sassy, exposing the messy truth behind the glamor. Point out the hypocrisy.
          - STRICT FORMATTING: Use Markdown. Break the story into 4-6 paragraphs. Use a double newline between paragraphs.
          - IMPORTANT: Output each metadata field on a NEW LINE.
          - NEVER use em dashes or en dashes. Only use regular hyphens.
          
          *** INTERNAL LINKING RULE (STRICT) ***
          - You MUST naturally embed at least one link from the 'PAST STORIES' provided above directly into the paragraphs of your article. 
          - Format the link perfectly in Markdown, for example: [Relevant Anchor Text](/posts/the-slug-url)
          - Do NOT create a "Read More" list at the bottom. Weave the link seamlessly into the text.
          
          OUTPUT:
          TITLE: [Cynical Gossip Headline]
          DESCRIPTION: [Spicy Summary]
          IMAGE_CAPTION: [Sassy Caption]
          CATEGORY: [{used_topic.replace('_', ' ').title()}]
          TAGS: [3 tags, e.g., Gossip, Drama, Trending]
          IMAGE_KEYWORD: [Single Concrete Noun]
          BODY:
          [Article text here with paragraphs]"""

          output = run_gemini(prompt)
          if not output: exit(1)

          # --- 6. PARSE & CLEAN ---
          def extract(key, text):
              # Allow optional markdown bolding around the key
              m = re.search(rf"^(?:\*\*?)?{key}(?:\*\*?)?:\s*(.*)", text, re.M | re.I)
              return m.group(1).strip() if m else None

          parsed = {
              "TITLE": extract("TITLE", output) or "Entertainment Updates",
              "DESC": extract("DESCRIPTION", output) or "Full story.",
              "CAPTION": extract("IMAGE_CAPTION", output) or "Spilling the tea.",
              "IMG": extract("IMAGE_KEYWORD", output) or "celebrity",
          }

          # ROBUST BODY EXTRACTION
          body_text = output
          metadata_keys = ["TITLE", "DESCRIPTION", "IMAGE_CAPTION", "CATEGORY", "TAGS", "IMAGE_KEYWORD", "BODY"]
          for key in metadata_keys:
              body_text = re.sub(rf"^(?:\*\*?)?{key}(?:\*\*?)?:\s*.*$", "", body_text, flags=re.M | re.I)
          
          parsed["BODY"] = body_text.strip()

          # Scrub only metadata, keep line breaks in BODY
          parsed["TITLE"] = clean_dashes(parsed["TITLE"])
          parsed["DESC"] = clean_dashes(parsed["DESC"])
          parsed["BODY"] = parsed["BODY"].replace('\u2014', '-').replace('\u2013', '-')

          # --- 7. IMAGE & SAVE ---
          date_now = datetime.datetime.utcnow().date().strftime('%Y-%m-%d')
          slug = re.sub(r'[^a-z0-9-]', '-', parsed["TITLE"].lower()).strip('-')
          u_key = os.environ.get("UNSPLASH_ACCESS_KEY")
          
          def get_img(q):
              fallback = "https://images.unsplash.com/photo-1542204165-65bf26472b9b?w=1200" # Camera/Paparazzi fallback
              if not u_key: return fallback
              for term in [q, "celebrity", "red carpet", "concert"]:
                  try:
                      url = f"https://api.unsplash.com/photos/random?query={term}&orientation=landscape&client_id={u_key}"
                      r = requests.get(url, timeout=5)
                      if r.status_code == 200: return r.json()['urls']['regular']
                  except: continue
              return fallback
          
          final_image_url = target_image if target_image else get_img(parsed['IMG'])

          final_md = textwrap.dedent(f"""\
          ---
          title: "{parsed['TITLE'].replace('"', "'")}"
          description: "{parsed['DESC'].replace('"', "'")}"
          date: "{date_now}"
          author: "Mercy Wambui"
          image: "{final_image_url}"
          imageCaption: "{parsed['CAPTION'].replace('"', "'")}"
          category: "{used_topic.replace('_', ' ').title()}"
          slug: "{slug}"
          ---

          {parsed['BODY']}

          <script type="application/ld+json">
          {{
            "@context": "https://schema.org",
            "@type": "AnalysisNewsArticle",
            "headline": "{parsed['TITLE'].replace('"', "'")}",
            "datePublished": "{date_now}",
            "author": {{"@type": "Person", "name": "Mercy Wambui"}}
          }}
          </script>
          """).strip()

          o_dir = os.environ.get("POSTS_DIR")
          os.makedirs(o_dir, exist_ok=True)
          with open(os.path.join(o_dir, f"{slug}.md"), "w", encoding="utf-8") as f: f.write(final_md)
          
          memory.append(final_hash)
          with open(memory_path, 'w') as f: json.dump(memory[-200:], f)
          print(f"✅ Published: {slug}")
          EOF

      - name: Git Safety Pull
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add .
          git stash -u
          git fetch origin main
          git pull origin main --rebase
          git stash pop || echo "Nothing to pop"

      - name: Commit and push article
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "content: mercy-gossip publish 💅"
          branch: ${{ env.DEFAULT_BRANCH }}
          file_pattern: 'src/content/posts/*.md .github/scrape_memory_mercy.json'